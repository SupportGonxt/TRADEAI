name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'workers-backend/**'
      - '.github/workflows/ci-cd-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'workers-backend/**'
      - '.github/workflows/ci-cd-backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: workers-backend/node_modules
          key: backend-deps-${{ hashFiles('workers-backend/package.json') }}
          restore-keys: |
            backend-deps-

      - name: Install dependencies
        run: npm install

      - name: Build check
        run: npx wrangler deploy --dry-run --outdir=dist

      - name: Run tests
        env:
          TEST_API_URL: http://localhost:8787
        run: npm test
        continue-on-error: true

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: workers-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: workers-backend
          apiEmail: ${{ secrets.CLOUDFLARE_EMAIL }}
          apiKey: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Backend deployed to Cloudflare Workers"
          echo "URL: https://tradeai-api.reshigan-085.workers.dev"
          sleep 10
          curl -sf https://tradeai-api.reshigan-085.workers.dev/health | jq . || echo "Health check pending"
